<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Auto Accept</title>
<style>
  /* ── Imports ── */
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #060a12;
    --bg2:       #0b1220;
    --bg3:       #111c30;
    --border:    rgba(0, 229, 255, 0.18);
    --accent:    #00e5ff;
    --accent2:   #0095a8;
    --success:   #00ff88;
    --danger:    #ff3d3d;
    --text:      #c8dce8;
    --text-dim:  #5a7a8a;
    --mono:      'Share Tech Mono', 'Courier New', monospace;
    --sans:      'Rajdhani', sans-serif;
  }

  body {
    width: 320px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    overflow: hidden;
    line-height: 1.4;
  }

  /* ── Header ── */
  .header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg) 100%);
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }

  .brand {
    flex: 1;
  }

  .brand-title {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .brand-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: var(--mono);
  }

  .master-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .master-toggle:hover {
    border-color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .toggle-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
  }

  .toggle-pill {
    width: 32px;
    height: 16px;
    background: var(--bg3);
    border: 1px solid #334;
    border-radius: 20px;
    position: relative;
    transition: all 0.3s;
  }

  .toggle-pill.on {
    background: rgba(0, 229, 255, 0.2);
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,229,255,0.3);
  }

  .toggle-pill::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 10px;
    height: 10px;
    background: #444;
    border-radius: 50%;
    transition: all 0.3s;
  }

  .toggle-pill.on::after {
    transform: translateX(16px);
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .status-bar {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 3px;
    border: 1px solid rgba(0,229,255,0.08);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }

  .status-dot.active {
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2s ease infinite;
  }

  .status-dot.inactive {
    background: #444;
  }

  .status-text {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.3; }
  }

  /* ── Sections ── */
  .section {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }

  .section:last-child { border-bottom: none; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── Timer ── */
  .timer-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .timer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .timer-display {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.4);
    min-width: 60px;
    text-align: center;
    line-height: 1;
  }

  .timer-display.instant {
    font-size: 18px;
    color: var(--success);
    text-shadow: 0 0 10px rgba(0,255,136,0.4);
  }

  .timer-unit {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-align: center;
    margin-top: 2px;
  }

  .timer-info {
    flex: 1;
    padding-left: 16px;
  }

  .timer-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .timer-desc strong {
    color: var(--text);
    display: block;
    margin-bottom: 2px;
  }

  .slider-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--bg3);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,229,255,0.5);
    transition: transform 0.1s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  /* ── Presets ── */
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 10px;
  }

  .preset-btn {
    padding: 5px 2px;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.12);
    box-shadow: 0 0 8px rgba(0,229,255,0.15);
  }

  /* ── Background ── */
  .bg-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }

  .bg-tab {
    flex: 1;
    padding: 6px;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .bg-tab:hover { border-color: var(--accent); color: var(--accent); }

  .bg-tab.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.1);
  }

  .bg-panel { display: none; }
  .bg-panel.visible { display: block; }

  .color-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .color-picker-wrap {
    position: relative;
    width: 40px;
    height: 28px;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
  }

  input[type="color"] {
    position: absolute;
    width: 140%;
    height: 140%;
    top: -20%;
    left: -20%;
    border: none;
    background: none;
    cursor: pointer;
  }

  .color-hex {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 8px;
    width: 90px;
    outline: none;
    color: var(--text);
  }

  .color-hex:focus { border-color: var(--accent); }

  .url-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 7px 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .url-input:focus { border-color: var(--accent); }

  .url-input::placeholder { color: var(--text-dim); }

  .range-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }

  .range-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    width: 70px;
    flex-shrink: 0;
  }

  .range-val {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  .swatches {
    display: flex;
    gap: 5px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .swatch {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .swatch:hover {
    transform: scale(1.2);
    box-shadow: 0 0 8px rgba(255,255,255,0.3);
  }

  /* ── Options ── */
  .option-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
  }

  .option-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    flex: 1;
  }

  .option-label .icon {
    font-size: 16px;
    width: 20px;
    text-align: center;
  }

  .option-label .desc {
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--mono);
    display: block;
  }

  .mini-toggle {
    width: 28px;
    height: 14px;
    background: var(--bg3);
    border: 1px solid #334;
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .mini-toggle.on {
    background: rgba(0,229,255,0.2);
    border-color: var(--accent);
  }

  .mini-toggle::after {
    content: '';
    position: absolute;
    top: 1px; left: 1px;
    width: 10px; height: 10px;
    background: #444;
    border-radius: 50%;
    transition: all 0.3s;
  }

  .mini-toggle.on::after {
    transform: translateX(14px);
    background: var(--accent);
  }

  /* ── Footer ── */
  .footer {
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    border-top: 1px solid var(--border);
  }

  .version {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .credit-link {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-decoration: none;
    opacity: 0.6;
    transition: opacity 0.2s, color 0.2s;
  }

  .credit-link:hover {
    opacity: 1;
    color: var(--accent);
  }

  .credit-link svg {
    flex-shrink: 0;
  }

  /* ── Scanline effect ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.015) 2px,
      rgba(0,0,0,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <svg class="logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="4" fill="rgba(0,229,255,0.08)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
      <circle cx="16" cy="16" r="8" stroke="rgba(0,229,255,0.5)" stroke-width="1" stroke-dasharray="2 2"/>
      <circle cx="16" cy="16" r="4" fill="rgba(0,229,255,0.15)" stroke="#00e5ff" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="1.5" fill="#00e5ff"/>
      <line x1="16" y1="4" x2="16" y2="10" stroke="rgba(0,229,255,0.4)" stroke-width="1"/>
      <line x1="16" y1="22" x2="16" y2="28" stroke="rgba(0,229,255,0.4)" stroke-width="1"/>
      <line x1="4" y1="16" x2="10" y2="16" stroke="rgba(0,229,255,0.4)" stroke-width="1"/>
      <line x1="22" y1="16" x2="28" y2="16" stroke="rgba(0,229,255,0.4)" stroke-width="1"/>
    </svg>
    <div class="brand">
      <div class="brand-title">Auto Accept</div>
      <div class="brand-sub">CS PLATFORM</div>
    </div>
    <div class="master-toggle" id="masterToggle">
      <span class="toggle-label" id="toggleLabel">OFF</span>
      <div class="toggle-pill" id="togglePill"></div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">MONITORING DISABLED</span>
  </div>
</div>

<!-- TIMER SECTION -->
<div class="section">
  <div class="section-header">
    <div class="section-line"></div>
    <span class="section-label">⏱ AUTO-ACCEPT DELAY</span>
    <div class="section-line"></div>
  </div>

  <div class="timer-container">
    <div class="timer-row">
      <div>
        <div class="timer-display" id="timerDisplay">3</div>
        <div class="timer-unit" id="timerUnit">SECONDS</div>
      </div>
      <div class="timer-info">
        <div class="timer-desc">
          <strong id="timerDescTitle">3 second delay</strong>
          <span id="timerDescBody">Enough time to react if needed. Cancel the countdown from the overlay.</span>
        </div>
      </div>
    </div>

    <div class="preset-grid" id="presetGrid">
      <button class="preset-btn" data-val="0">INST</button>
      <button class="preset-btn active" data-val="3">3s</button>
      <button class="preset-btn" data-val="5">5s</button>
      <button class="preset-btn" data-val="10">10s</button>
      <button class="preset-btn" data-val="15">15s</button>
    </div>

    <div class="slider-wrap">
      <input type="range" id="delaySlider" min="0" max="20" step="1" value="3">
      <div class="slider-labels">
        <span>INSTANT</span>
        <span>20s</span>
      </div>
    </div>
  </div>
</div>

<!-- BACKGROUND SECTION -->
<div class="section">
  <div class="section-header">
    <div class="section-line"></div>
    <span class="section-label">🎨 BACKGROUND</span>
    <div class="section-line"></div>
  </div>

  <div class="bg-tabs">
    <button class="bg-tab active" data-tab="default">DEFAULT</button>
    <button class="bg-tab" data-tab="color">COLOR</button>
    <button class="bg-tab" data-tab="image">IMAGE URL</button>
  </div>

  <!-- Color panel -->
  <div class="bg-panel" id="panel-color">
    <div class="color-row">
      <div class="color-picker-wrap">
        <input type="color" id="bgColorPicker" value="#0a0e1a">
      </div>
      <input type="text" class="color-hex" id="bgColorHex" value="#0a0e1a" maxlength="7" spellcheck="false">
    </div>
    <div class="swatches" id="swatches"></div>
    <div class="range-row">
      <span class="range-label">BRIGHTNESS</span>
      <input type="range" id="bgBrightness" min="10" max="150" value="100">
      <span class="range-val" id="brightnessVal">100%</span>
    </div>
  </div>

  <!-- Image panel -->
  <div class="bg-panel" id="panel-image">
    <input type="text" class="url-input" id="bgImageUrl" placeholder="https://example.com/bg.jpg">
    <div class="range-row">
      <span class="range-label">BLUR</span>
      <input type="range" id="bgBlur" min="0" max="20" value="0">
      <span class="range-val" id="blurVal">0px</span>
    </div>
    <div class="range-row">
      <span class="range-label">BRIGHTNESS</span>
      <input type="range" id="bgBrightnessImg" min="10" max="150" value="100">
      <span class="range-val" id="brightnessImgVal">100%</span>
    </div>
  </div>
</div>

<!-- OPTIONS SECTION -->
<div class="section">
  <div class="section-header">
    <div class="section-line"></div>
    <span class="section-label">⚙ OPTIONS</span>
    <div class="section-line"></div>
  </div>

  <div class="option-row">
    <label class="option-label">
      <span class="icon">🔔</span>
      <span>
        Sound alert
        <span class="desc">Beep when match found</span>
      </span>
    </label>
    <div class="mini-toggle" id="soundToggle"></div>
  </div>

  <div class="option-row">
    <label class="option-label">
      <span class="icon">⚡</span>
      <span>
        Screen flash
        <span class="desc">Flash effect on match</span>
      </span>
    </label>
    <div class="mini-toggle" id="flashToggle"></div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <span class="version">v1.0.0</span>
  <a class="credit-link" href="https://github.com/yarin17c/Auto-Accept-Enhancer" target="_blank" title="GitHub">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">

               .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
               -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
               .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
               .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
               0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
    yarin17c
  </a>
</div>

<script src="popup.js"></script>
</body>
</html>
